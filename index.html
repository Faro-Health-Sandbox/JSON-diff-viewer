<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; connect-src 'none'; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;">
  <title>FSD SOA Diff Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    code, .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
    .diff-row { animation: fadeSlideIn 0.15s ease; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .file-label-a { background: #dbeafe; color: #1d4ed8; }
    .file-label-b { background: #ede9fe; color: #7c3aed; }
    .file-label-c { background: #fce7f3; color: #be185d; }
    .file-label-d { background: #dcfce7; color: #15803d; }
    .file-label-e { background: #fef9c3; color: #b45309; }
    .row-added   { background: #F0FDF4; }
    .row-removed { background: #FEF2F2; }
    .row-changed { background: #FEF3C7; }
    .row-updated { background: #FEF3C7; }
    .val-added   { color: #166534; font-weight: 500; }
    .val-removed { color: #991B1B; font-weight: 500; }
    .val-changed { color: #92400E; font-weight: 500; }
    .val-match   { color: #6B7280; }
    .val-absent  { color: #D1D5DB; }
    .row-moved   { background: #F5F3FF; }
    .row-present { background: #FAFAFA; }
    .val-moved   { color: #6D28D9; font-weight: 500; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="h-full bg-gray-50 text-gray-900">

<!-- HEADER -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-20">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-semibold text-gray-900 leading-tight">FSD SOA Diff Visualizer</h1>
      <p class="text-xs text-gray-400 mt-0.5">Compare Schedule of Activities between study exports</p>
    </div>
    <span class="flex items-center gap-1.5 text-xs text-gray-500 bg-gray-100 px-3 py-1.5 rounded-full select-none">
      <svg class="w-3 h-3 text-green-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clip-rule="evenodd"/>
      </svg>
      100% local — no data leaves your browser
    </span>
  </div>
</header>

<!-- MAIN -->
<main class="max-w-6xl mx-auto px-4 py-8 space-y-5 overflow-x-hidden">

      <div class="flex flex-col items-center gap-3 pointer-events-none px-4 py-6">
        <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
          <svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m.75 12l3 3m0 0l3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-medium text-gray-700">Drop 2–5 JSON files here</p>

    </div>
    <input type="file" id="file-input" class="hidden" multiple accept=".json,application/json">

    <div id="upload-right" class="hidden flex-1 flex flex-col justify-between gap-4 min-w-0">

          style="box-shadow:0 1px 0 rgba(0,0,0,.08),inset 0 -1px 0 rgba(0,0,0,.2)">

          </svg>
          Compare SOA
        </button>
        <button id="compare-other-btn"
          class="flex items-center gap-2 px-3 py-1.5 bg-[#1a1a1a] hover:bg-[#2a2a2a] active:bg-[#111] text-white text-sm font-medium rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
          style="box-shadow:0 1px 0 rgba(0,0,0,.08),inset 0 -1px 0 rgba(0,0,0,.2)">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z"/>
          </svg>
          Compare Other Sections
        </button>
        <button id="clear-btn"
          class="px-3 py-1.5 text-sm text-gray-700 font-medium bg-white hover:bg-gray-50 active:bg-gray-100 border border-gray-300 rounded-lg transition-colors"

          Clear all

      </div>
    </div>
  </div>

  <!-- Results Section -->
  <div id="results-section" class="hidden space-y-4">

    <!-- Tab bar + Copy -->
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div id="tab-bar" class="flex flex-wrap gap-1"></div>
      <div class="flex items-center gap-2">
        <button id="copy-btn"
          class="flex items-center gap-2 px-3 py-1.5 bg-[#1462FF] hover:bg-[#0d52e0] active:bg-[#0a47c9] text-white text-xs font-medium rounded-lg transition-colors"
          style="box-shadow:0 1px 0 rgba(0,0,0,.08),inset 0 -1px 0 rgba(0,0,0,.2)">

            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z"/>

        <!-- Download dropdown -->
        <div class="relative" id="download-wrapper">

            style="box-shadow:0 1px 0 rgba(0,0,0,.08),inset 0 -1px 0 rgba(0,0,0,.2)">

            <button id="download-pdf" class="w-full text-left px-3 py-2 text-gray-700 hover:bg-gray-50 transition-colors">Download as PDF</button>
          </div>

      </div>
    </div>

    <!-- Summary bar -->
    <div id="summary-bar" class="flex items-center gap-3 flex-wrap"></div>

    <!-- Diff table -->

  </div>
