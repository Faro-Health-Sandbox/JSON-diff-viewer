<!-- TOAST -->
<div id="toast" class="hidden fixed top-5 right-5 z-50 flex items-center gap-2.5 bg-gray-900 text-white text-sm px-4 py-3 rounded-xl shadow-2xl">
  <svg class="w-4 h-4 text-green-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
  </svg>
  <span id="toast-msg">Copied!</span>
</div>

<script>
'use strict';

// ================================================================
// STATE
// ================================================================
const state = {
  files: [],            // { id, name, size, parsed, error }
  soaSections: [],      // per-file array of { title, soa }
  selectedSoaIdxs: [],  // selected section index per file
  activeTab: 'all',
  diffResult: null,     // { epochs, groups, activities, rules, days, footnotes }
  compareRan: false,
  compareMode: 'soa',       // 'soa' | 'other'
  otherDiffResult: null,    // { tabs, byTab }
};

// ================================================================
// UTILITIES
// ================================================================
function esc(str) {
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}
function displayName(filename) {
  return filename.replace(/\.json$/i,'').replace(/\.\d{4}-[A-Z]{3}-\d{2}T\S*/i,'');
}
function fileLabel(idx) { return String.fromCharCode(65 + idx); }
function labelClass(idx) {
  return ['file-label-a','file-label-b','file-label-c','file-label-d','file-label-e'][idx] || 'file-label-a';
}
function isEncrypted(val) {
  return typeof val === 'string' && val.length > 80
    && /^[A-Za-z0-9+/]{60,}={0,2}$/.test(val.replace(/\r?\n/g,''));
}
function isHtml(val) { return typeof val === 'string' && /<[a-z][\s\S]*>/i.test(val); }
function stripHtml(str) {
  // Remove tags, then decode common HTML entities
  return String(str || '').replace(/<[^>]*>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&nbsp;/g,' ').replace(/&ndash;/g,'–').replace(/&mdash;/g,'—')
    .replace(/&quot;/g,'"').replace(/&#39;/g,"'")
    .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(parseInt(n, 10)))
    .trim();
}
function humanKey(key) {
  return key.replace(/([a-z])([A-Z])/g,'$1 $2').replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2')
    .replace(/^./,s => s.toUpperCase()).trim();
}
function toast(msg = 'Done!', ms = 2500) {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.add('hidden'), ms);
}
function displayVal(val) {
  if (val === null || val === undefined) return '—';
  if (isEncrypted(val)) return '[encrypted]';
  if (isHtml(val)) return stripHtml(val) || '[rich text]';
  if (typeof val === 'boolean') return String(val);
  if (typeof val === 'number') return String(val);
  if (typeof val === 'string') return val;
  if (Array.isArray(val)) return `[${val.length} items]`;
  if (typeof val === 'object') {
    const name = val.name ?? val.title ?? val.label ?? null;
    if (name) return String(name);
    return `{${Object.keys(val).length} fields}`;
  }
  return String(val);
}
// Resolve dot-path like 'epochType.name' on an object
function getPath(obj, path) {
  if (obj == null) return null;
  let cur = obj;
  for (const p of path.split('.')) {
    if (cur == null || typeof cur !== 'object') return null;
    cur = cur[p] ?? null;
  }
  return cur;
}
function validFiles() { return state.files.filter(f => f.parsed && !f.error); }

// ================================================================
// SOA EXTRACTION
// ================================================================
function extractSoaSections(parsed) {
  if (!parsed || typeof parsed !== 'object') return [];
  const result = [];
  const walk = (sections) => {
    if (!Array.isArray(sections)) return;
    for (const sec of sections) {
      if (!sec) continue;
      if (sec.scheduleOfActivities) {
        result.push({
          title: stripHtml(sec.title || '') || sec.id || 'Untitled SOA',
          soa: sec.scheduleOfActivities,
        });
      }
      // Recurse into folder/container sections
      if (sec.children) walk(sec.children);
      if (sec.sections) walk(sec.sections);
    }
  };
  walk(parsed.sections);
  return result;
}

// ================================================================
// DIFF ENGINE
// ================================================================

// Union of all keys across N maps
function unionKeys(maps) {
  const all = new Set();
  for (const m of maps) for (const k of m.keys()) all.add(k);
  return all;
}

// Determine change type from values array (null = absent in that file)
function changeType(values) {
  const nulls = values.filter(v => v === null || v === undefined).length;
  if (nulls === values.length) return null;
  if (nulls === 0) return 'changed';
  return values[0] == null ? 'added' : 'removed';
}

// Stable string equality ignoring null-vs-undefined
function eq(a, b) { return String(a ?? '') === String(b ?? ''); }
function allEq(vals) { return vals.every(v => eq(v, vals[0])); }

// ---- Semantic key builders ----

// Epochs: key = epochType.id (e.g. "screening", "blinded-treatment")
function buildEpochByTypeIdMap(arr) {
  const map = new Map();
  if (Array.isArray(arr)) for (const e of arr) if (e?.epochType?.id) map.set(e.epochType.id, e);
  return map;
}

// Per-file epoch UUID → display title (for resolving scheduledDay.epochId references)
function buildEpochRefMap(arr) {
  const map = new Map();
  if (Array.isArray(arr)) {
    for (const e of arr) {
      if (e?.id) map.set(e.id, stripHtml(e.title || '') || e.epochType?.name || e.epochType?.id || '');
    }
  }
  return map;
}

// Groups / days / time slots: key = name
function buildByName(arr) {
  const map = new Map();
  if (Array.isArray(arr)) for (const item of arr) if (item?.name != null) map.set(String(item.name), item);
  return map;
}

// Activities: flatten nested children, key = name (within group scope)
function flattenChildrenByName(children) {
  const map = new Map();
  const recurse = nodes => {
    if (!Array.isArray(nodes)) return;
    for (const n of nodes) {
      if (n?.name) map.set(n.name, n);
      if (n?.children) recurse(n.children);
    }
  };
  recurse(children);
  return map;
}

// Schedule rules: composite key — type|epochDay for fixed/non-fixed-day,
// custom-non-reported|description for custom-non-reported, type|epochDay|desc otherwise
function buildRuleKeyMap(rules) {
  const map = new Map();
  if (!Array.isArray(rules)) return map;
  for (const rule of rules) {
    const t = rule.type ?? '';
    let key;
    if (t === 'custom-non-reported') {
      key = `custom-non-reported|${rule.description ?? ''}`;
    } else {
      key = `${t}|${rule.epochDay ?? ''}`;
    }
    if (!map.has(key)) map.set(key, rule); // first occurrence wins
  }
  return map;
}

// Footnotes: key = whitespace-normalised text
function buildFootnoteByTextMap(arr) {
  const map = new Map();
  if (Array.isArray(arr)) {
    for (const fn of arr) {
      const key = String(fn?.text ?? '').replace(/\s+/g, ' ').trim();
      if (key && !map.has(key)) map.set(key, fn);
    }
  }
  return map;
}

// Per-file activity UUID → name (for resolving footnote.activityIds)
function buildActivityIdNameMap(soa) {
  const map = new Map();
  const recurse = children => {
    for (const act of (children || [])) {
      if (act?.id && act?.name) map.set(act.id, act.name);
      if (act?.children) recurse(act.children);
    }
  };
  for (const grp of (soa?.activityGroups || [])) recurse(grp?.children);
  return map;
}

// Format added/removed activity value including type info
function fmtActivitySummary(act) {
  if (!act) return null;
  const meta = [
    act.activityType?.name ?? act.type,
    act.activitySubType?.name ?? act.subType ?? act.subtype,
  ].filter(v => v != null && v !== '');
  return (act.name || '(unnamed)') + (meta.length ? ` (${meta.join(', ')})` : '');
}

// Format an added/removed rule as a readable property summary
function fmtRuleSummary(rule) {
  if (!rule) return null;
  const parts = [];
  if (rule.type != null)        parts.push(`type: ${rule.type}`);
  if (rule.epochDay != null)    parts.push(`day: ${rule.epochDay}`);
  if (rule.endEpochDay != null) parts.push(`endDay: ${rule.endEpochDay}`);
  if (rule.cardinality != null) parts.push(`cardinality: ${rule.cardinality}`);
  if (rule.showAllDays != null) parts.push(`showAllDays: ${rule.showAllDays}`);
  if (rule.description != null) parts.push(`desc: "${rule.description}"`);
  return parts.length ? parts.join(', ') : '(no fields)';
}

// --- 1. Epochs (match by epochType.id) ---
function diffEpochs(soas) {
  const typeIdMaps  = soas.map(soa => buildEpochByTypeIdMap(soa?.epochConfiguration?.epochs));
  const epochRefMaps = soas.map(soa => buildEpochRefMap(soa?.epochConfiguration?.epochs));
  const allKeys = unionKeys(typeIdMaps);
  const rows = [];

  for (const typeId of allKeys) {
    const epochs = typeIdMaps.map(m => m.get(typeId) || null);
    if (epochs.every(e => e === null)) continue;
    const rep = epochs.find(e => e !== null);
    const title = stripHtml(rep?.title || '') || rep?.epochType?.name || typeId;
    const ct = changeType(epochs);

    if (epochs.some(e => e === null)) {
      const summary = [
        rep.title ? `title: ${stripHtml(rep.title)}` : null,
        rep.epochType?.name ? `type: ${rep.epochType.name}` : null,
        rep.duration?.days != null ? `duration: ${rep.duration.days} ${rep.duration.timeUnit || 'days'}` : null,
      ].filter(Boolean).join(', ');
      rows.push({ category:'Epoch', location:title, field:'—', values:epochs.map(e => e ? summary : null), changeType:ct });
    } else {
      for (const [path, label, fmt] of [
        ['title',            'title',           v => v ? stripHtml(v) : null],
        ['epochType.name',   'epoch type',      null],
        ['duration.days',    'duration (days)', null],
        ['duration.timeUnit','duration unit',   null],
      ]) {
        const vals = epochs.map(e => { const v = getPath(e, path); return fmt ? fmt(v) : v; });
        if (allEq(vals)) continue;
        rows.push({ category:'Epoch', location:title, field:label, values:vals, changeType:'changed' });
      }
    }
  }
  return { rows, epochRefMaps };
}

// --- 2. Activity Groups (match by name) ---
function diffActivityGroups(soas) {
  const maps = soas.map(soa => buildByName(soa?.activityGroups));
  const allNames = unionKeys(maps);
  const rows = [];

  for (const name of allNames) {
    const groups = maps.map(m => m.get(name) || null);
    if (groups.every(g => g === null)) continue;
    // 'present' = matched in all files (shown as reference row in Groups tab)
    // 'added'/'removed' = only in some files
    const ct = groups.some(g => g === null) ? changeType(groups) : 'present';
    rows.push({
      category: 'Activity Group', location: name, field: '—',
      values: groups.map(g => g ? (g.name || '(unnamed)') : null),
      changeType: ct,
    });
  }
  return { rows };
}

// --- 3. Activities (match per activity name, compute group-membership set per file) ---
// activityMap key: `${groupName}\x00${actName}` → { name, groupName, perFile: (act|null)[] }
//
// For each activity name, we compute the set of groups it appears in per file. The diff
// is then expressed as set membership changes:
//   - groupsA - groupsB = groups only in file A  (removed from those groups)
//   - groupsB - groupsA = groups only in file B  (added to those groups)
//   - groupsA ∩ groupsB = groups present in both (matched — check placeholder status)
//
// Interpretation:
//   - only in A + only in B both non-empty → "Moved" (real cross-group relocation)
//   - only in A non-empty, only in B empty → "Removed" (with matched groups noted as context)
//   - only in A empty, only in B non-empty → "Added"   (with matched groups noted as context)
//   - both empty, matched non-empty        → no-op (or placeholder-change row)
function diffActivities(soas) {
  const n = soas.length;

  // Per file: actName → Map<groupName, activity>
  const actToGroupsPerFile = soas.map(soa => {
    const m = new Map();
    for (const grp of (soa?.activityGroups || [])) {
      const groupName = grp.name || '';
      const recurse = children => {
        for (const act of (children || [])) {
          if (act?.name) {
            if (!m.has(act.name)) m.set(act.name, new Map());
            m.get(act.name).set(groupName, act);
          }
          if (act?.children) recurse(act.children);
        }
      };
      recurse(grp?.children);
    }
    return m;
  });

  // Union of all activity names
  const allActNames = new Set();
  for (const m of actToGroupsPerFile) for (const name of m.keys()) allActNames.add(name);

  const rows = [];
  const activityMap = new Map();

  for (const actName of allActNames) {
    const gmPerFile = actToGroupsPerFile.map(m => m.get(actName) || new Map());

    // All groups this activity appears in (across all files)
    const allGroups = new Set();
    for (const gm of gmPerFile) for (const g of gm.keys()) allGroups.add(g);

    // Classify each group: matched (in all files) vs. onlyIn[fi] (only in that file)
    const matchedGroups = [];
    const onlyIn = Array.from({ length: n }, () => []);
    for (const g of allGroups) {
      const present = gmPerFile.map(gm => gm.has(g));
      if (present.every(p => p)) matchedGroups.push(g);
      else for (let fi = 0; fi < n; fi++) if (present[fi]) onlyIn[fi].push(g);
    }

    // Populate activityMap for EVERY (group, actName) composite key — needed by diffScheduleRules
    for (const g of allGroups) {
      const perFile = gmPerFile.map(gm => gm.get(g) || null);
      activityMap.set(`${g}\x00${actName}`, { name: actName, groupName: g, perFile });
    }

    // Matched groups: compare placeholder status
    for (const g of matchedGroups) {
      const activities = gmPerFile.map(gm => gm.get(g));
      const phVals = activities.map(a =>
        (a?.placeholderName != null || a?.assessmentMeasurementConfigurationId == null)
          ? 'placeholder' : 'configured activity'
      );
      if (!allEq(phVals)) {
        rows.push({
          category: 'Activity',
          location: g ? `${g} › ${actName}` : actName,
          field: 'type', values: phVals, changeType: 'changed',
        });
      }
    }

    // Diff rows for unmatched group memberships (N=2 only; N>2 falls back to separate rows)
    if (n === 2) {
      const [only0, only1] = onlyIn;
      const matchedNote = matchedGroups.length ? ` (also in ${matchedGroups.join(', ')})` : '';

      if (only0.length === 0 && only1.length === 0) continue; // no group changes

      if (only0.length > 0 && only1.length > 0) {
        // Cross-group Move: A had it in {only0}, B has it in {only1}
        const actA = gmPerFile[0].get(only0[0]);
        const actB = gmPerFile[1].get(only1[0]);
        const fromStr = only0.join(' + '), toStr = only1.join(' + ');
        const movedLoc = `${fromStr} › ${actName} → ${toStr} › ${actName}${matchedNote}`;
        rows.push({
          category: 'Activity', location: movedLoc, field: 'group',
          values: [fromStr, toStr], changeType: 'moved',
        });
      } else if (only0.length > 0) {
        // Pure removal from some groups in file A (possibly still in matched groups)
        for (const g of only0) {
          const act = gmPerFile[0].get(g);
          const loc = (g ? `${g} › ${actName}` : actName) + matchedNote;
          rows.push({
            category: 'Activity', location: loc, field: '—',
            values: [fmtActivitySummary(act), null], changeType: 'removed',
          });
        }
      } else {
        // Pure addition to some groups in file B (possibly already in matched groups)
        for (const g of only1) {
          const act = gmPerFile[1].get(g);
          const loc = (g ? `${g} › ${actName}` : actName) + matchedNote;
          rows.push({
            category: 'Activity', location: loc, field: '—',
            values: [null, fmtActivitySummary(act)], changeType: 'added',
          });
        }
      }
    } else {
      // N > 2: emit one row per group-file mismatch
      for (let fi = 0; fi < n; fi++) {
        for (const g of onlyIn[fi]) {
          const act = gmPerFile[fi].get(g);
          const values = gmPerFile.map((gm, i) => i === fi ? fmtActivitySummary(act) : null);
          const ct = changeType(values);
          if (ct) rows.push({
            category: 'Activity',
            location: g ? `${g} › ${actName}` : actName,
            field: '—', values, changeType: ct,
          });
        }
      }
    }
  }

  return { rows, activityMap };
}

// --- 4. Schedule Rules (match by composite key, pair unmatched rules when counts align) ---
// Note: cardinality and showAllDays suppressed — these are noisy defaults that rarely signal real changes
const RULE_COMPARE_FIELDS = ['endEpochDay','description'];

// Compare two pre-built rule key maps and return diff rows for a given location (N=2 only).
function compareRuleMaps(mapA, mapB, location) {
  const allRuleKeys = new Set([...mapA.keys(), ...mapB.keys()]);
  if (!allRuleKeys.size) return [];

  const actRows = [];
  const ua = [], ub = []; // unmatched rules per side

  for (const ruleKey of allRuleKeys) {
    const ra = mapA.get(ruleKey) || null;
    const rb = mapB.get(ruleKey) || null;
    if (!ra && !rb) continue;

    if (ra && rb) {
      // Fully matched — compare non-key fields
      const isCustom = ruleKey.startsWith('custom-non-reported|');
      const fields = isCustom ? RULE_COMPARE_FIELDS.filter(f => f !== 'description') : RULE_COMPARE_FIELDS;
      for (const field of fields) {
        if (eq(ra[field], rb[field])) continue;
        actRows.push({ category:'Schedule Rule', location, field,
          values:[ra[field]??null, rb[field]??null], changeType:'changed' });
      }
    } else {
      if (ra) ua.push(ra);
      if (rb) ub.push(rb);
    }
  }

  // Pair unmatched rules
  if (ua.length > 0 || ub.length > 0) {
    if (ua.length === ub.length && ua.length > 0) {
      // Clean 1-to-1 pairing — compare field by field, consolidate epoch-day rows
      const pairRows = [];
      for (let i = 0; i < ua.length; i++) {
        const ra = ua[i], rb = ub[i];
        for (const f of ['type','epochDay','endEpochDay','description']) {
          if (!eq(ra[f], rb[f])) {
            pairRows.push({ category:'Schedule Rule', location, field:f,
              values:[ra[f]??null, rb[f]??null], changeType:'updated' });
          }
        }
      }
      if (!pairRows.length) {
        for (let i = 0; i < ua.length; i++) {
          actRows.push({ category:'Schedule Rule', location, field:'—',
            values:[fmtRuleSummary(ua[i]), fmtRuleSummary(ub[i])], changeType:'updated' });
        }
      } else {
        const edRows = pairRows.filter(r => r.field === 'epochDay');
        const others  = pairRows.filter(r => r.field !== 'epochDay');
        if (edRows.length > 1) {
          const aStr = edRows.map(r => r.values[0]).filter(v => v != null).join(', ');
          const bStr = edRows.map(r => r.values[1]).filter(v => v != null).join(', ');
          actRows.push({ category:'Schedule Rule', location, field:'epochDay',
            values:[aStr || null, bStr || null], changeType:'updated' });
        } else {
          actRows.push(...edRows);
        }
        actRows.push(...others);
      }
    } else {
      // Counts differ — consolidate added/removed rules by type with comma-separated days
      const consolidateSide = (rules, sideIdx) => {
        const byType = new Map();
        for (const r of rules) {
          const t = r.type ?? 'unknown';
          if (!byType.has(t)) byType.set(t, []);
          byType.get(t).push(r);
        }
        for (const [type, rs] of byType) {
          const days = rs.map(r => r.epochDay).filter(d => d != null).sort((a,b)=>a-b);
          const dayStr = days.length ? ` — day${days.length > 1 ? 's' : ''}: ${days.join(', ')}` : '';
          const vals = sideIdx === 0 ? [`${type}${dayStr}`, null] : [null, `${type}${dayStr}`];
          actRows.push({ category:'Schedule Rule', location, field:'scheduleRuleType',
            values: vals, changeType: sideIdx === 0 ? 'removed' : 'added' });
        }
      };
      consolidateSide(ua, 0);
      consolidateSide(ub, 1);
    }
  }

  return actRows;
}

function diffScheduleRules(soas, activityMap) {
  const n = soas.length;
  const rows = [];

  if (n === 2) {
    // Group entries by actName to detect cross-group moves
    const byActName = new Map();
    for (const [, entry] of activityMap) {
      const { name: actName } = entry;
      if (!byActName.has(actName)) byActName.set(actName, []);
      byActName.get(actName).push(entry);
    }

    for (const [actName, entries] of byActName) {
      // Classify: matched = activity in same group in both files
      //           aOnly   = activity only in file A (group not present in B)
      //           bOnly   = activity only in file B (group not present in A)
      const matched = entries.filter(e => e.perFile[0] != null && e.perFile[1] != null);
      const aOnly   = entries.filter(e => e.perFile[0] != null && e.perFile[1] == null);
      const bOnly   = entries.filter(e => e.perFile[0] == null && e.perFile[1] != null);

      // Matched groups: normal rule diff
      for (const entry of matched) {
        const location = entry.groupName ? `${entry.groupName} › ${actName}` : actName;
        const mapA = buildRuleKeyMap(entry.perFile[0]?.activityScheduleRules);
        const mapB = buildRuleKeyMap(entry.perFile[1]?.activityScheduleRules);
        const actRows = compareRuleMaps(mapA, mapB, location);
        if (actRows.length) {
          rows.push({ isGroupHeader:true, location, category:'Schedule Rule', field:'', values:[], changeType:'' });
          rows.push(...actRows);
        }
      }

      if (aOnly.length > 0 && bOnly.length > 0) {
        // Cross-group move: same activity name, different groups between A and B.
        // Merge all A-side rules and all B-side rules, then compare.
        // If rules are identical → suppress entirely (already captured in Activities "moved" row).
        // If rules differ → show under a "GroupA → GroupB › actName" location.
        const mergedA = new Map();
        for (const e of aOnly) for (const [k,v] of buildRuleKeyMap(e.perFile[0]?.activityScheduleRules)) mergedA.set(k, v);
        const mergedB = new Map();
        for (const e of bOnly) for (const [k,v] of buildRuleKeyMap(e.perFile[1]?.activityScheduleRules)) mergedB.set(k, v);

        const fromGroups = aOnly.map(e => e.groupName).filter(Boolean).join(' + ') || actName;
        const toGroups   = bOnly.map(e => e.groupName).filter(Boolean).join(' + ') || actName;
        const movedLoc   = `${fromGroups} → ${toGroups} › ${actName}`;

        const crossRows = compareRuleMaps(mergedA, mergedB, movedLoc);
        if (crossRows.length) {
          rows.push({ isGroupHeader:true, location: movedLoc, category:'Schedule Rule', field:'', values:[], changeType:'' });
          rows.push(...crossRows);
        }
        // crossRows empty → rules identical after group move → suppress (no noise)

      } else {
        // Pure adds or removes — no cross-group counterpart, show as-is
        for (const entry of [...aOnly, ...bOnly]) {
          const location = entry.groupName ? `${entry.groupName} › ${actName}` : actName;
          const mapA = buildRuleKeyMap(entry.perFile[0]?.activityScheduleRules);
          const mapB = buildRuleKeyMap(entry.perFile[1]?.activityScheduleRules);
          const actRows = compareRuleMaps(mapA, mapB, location);
          if (actRows.length) {
            rows.push({ isGroupHeader:true, location, category:'Schedule Rule', field:'', values:[], changeType:'' });
            rows.push(...actRows);
          }
        }
      }
    }

  } else {
    // N > 2: no cross-group move detection; process each composite key entry directly
    for (const [, { name:actName, groupName, perFile }] of activityMap) {
      const location = groupName ? `${groupName} › ${actName}` : actName;
      const ruleMaps = perFile.map(act => buildRuleKeyMap(act?.activityScheduleRules));
      const allRuleKeys = unionKeys(ruleMaps);
      if (!allRuleKeys.size) continue;

      const actRows = [];
      const unmatched = Array.from({ length: n }, () => []);

      for (const ruleKey of allRuleKeys) {
        const rules = ruleMaps.map(m => m.get(ruleKey) || null);
        if (rules.every(r => r === null)) continue;
        if (rules.every(r => r !== null)) {
          const isCustom = ruleKey.startsWith('custom-non-reported|');
          const fields = isCustom ? RULE_COMPARE_FIELDS.filter(f => f !== 'description') : RULE_COMPARE_FIELDS;
          for (const field of fields) {
            const vals = rules.map(r => r[field] ?? null);
            if (allEq(vals)) continue;
            actRows.push({ category:'Schedule Rule', location, field, values:vals, changeType:'changed' });
          }
        } else {
          rules.forEach((r, fi) => { if (r !== null) unmatched[fi].push(r); });
        }
      }
      unmatched.forEach((list, fi) => {
        for (const r of list) {
          const values = perFile.map((_, fi2) => fi2 === fi ? fmtRuleSummary(r) : null);
          actRows.push({ category:'Schedule Rule', location, field:'—',
            values, changeType: changeType(values) || 'removed' });
        }
      });

      if (actRows.length) {
        rows.push({ isGroupHeader:true, location, category:'Schedule Rule', field:'', values:[], changeType:'' });
        rows.push(...actRows);
      }
    }
  }

  return rows;
}

// --- 5. Scheduled Days (match by name / visit label) ---
function diffScheduledDays(soas, epochRefMaps) {
  const maps = soas.map(soa => buildByName(soa?.scheduledDays));
  const allNames = unionKeys(maps);
  const rows = [];

  for (const dayName of allNames) {
    const days = maps.map(m => m.get(dayName) || null);
    if (days.every(d => d === null)) continue;
    const rep = days.find(d => d !== null);
    const repFi = days.findIndex(d => d !== null);
    const ct = changeType(days);

    // Resolve epoch title from the representative file (epochId → title)
    const epochTitle = epochRefMaps[repFi]?.get(rep.epochId) || '';
    // Location prefixed with epoch: "Screening › Visit 4"
    const location = epochTitle ? `${epochTitle} › ${dayName}` : dayName;
    // Epoch Day column label: "Screening Day 3" or plain "Day 3"
    const rawEpochDay = rep?.epochDay ?? null;
    const epochDayLabel = rawEpochDay != null
      ? (epochTitle ? `${epochTitle} Day ${rawEpochDay}` : `Day ${rawEpochDay}`)
      : null;

    if (days.some(d => d === null)) {
      const summary = [
        rep.epochDay != null ? `day: ${rep.epochDay}` : null,
        epochTitle ? `epoch: ${epochTitle}` : null,
        rep.type ? `type: ${rep.type}` : null,
      ].filter(Boolean).join(', ');
      rows.push({ category:'Scheduled Day', location, epochDay:epochDayLabel, field:'—',
        values:days.map(d => d ? summary : null), changeType:ct });
    } else {
      // Compare type field (epochDay and epoch are handled below)
      for (const [field, label] of [['type','type']]) {
        const vals = days.map(d => d?.[field] ?? null);
        if (allEq(vals)) continue;
        rows.push({ category:'Scheduled Day', location, epochDay:epochDayLabel, field:label, values:vals, changeType:'changed' });
      }
      // Epoch: resolve each file's epochId to a human title
      const epochVals = days.map((d, fi) => epochRefMaps[fi]?.get(d?.epochId) || null);
      if (!allEq(epochVals)) {
        rows.push({ category:'Scheduled Day', location, epochDay:epochDayLabel, field:'epoch', values:epochVals, changeType:'changed' });
      }
      // EpochDay number comparison (catches days that moved within an epoch)
      const epochDayVals = days.map(d => d?.epochDay ?? null);
      if (!allEq(epochDayVals)) {
        rows.push({ category:'Scheduled Day', location, epochDay:epochDayLabel, field:'epoch day', values:epochDayVals, changeType:'changed' });
      }

      // Time slots (match by name) — only inject rows when slots actually differ
      const slotMaps = days.map(d => buildByName(d?.intraDaySchedule?.timeSlots));
      const allSlotNames = unionKeys(slotMaps);
      const slotRows = [];
      for (const slotName of allSlotNames) {
        const slots = slotMaps.map(m => m.get(slotName) || null);
        if (slots.every(s => s === null)) continue;
        const slotCt = changeType(slots);
        const slotLoc = `${location} › ${slotName}`;
        if (slots.some(s => s === null)) {
          const rs = slots.find(s => s !== null);
          const sum = [`duration: ${rs.duration ?? '—'}`, rs.type ? `type: ${rs.type}` : null].filter(Boolean).join(', ');
          slotRows.push({ category:'Time Slot', location:slotLoc, epochDay:epochDayLabel, field:'—',
            values:slots.map(s => s ? sum : null), changeType:slotCt });
        } else {
          for (const field of ['duration','type']) {
            const vals = slots.map(s => s?.[field] ?? null);
            if (allEq(vals)) continue;
            slotRows.push({ category:'Time Slot', location:slotLoc, epochDay:epochDayLabel, field, values:vals, changeType:'changed' });
          }
        }
      }
      // Inject separator above slot rows only when there are actual slot diffs
      if (slotRows.length) {
        rows.push({ isGroupHeader:true, location:`${location} — time slots`, category:'Time Slot', field:'', values:[], changeType:'' });
        rows.push(...slotRows);
      }
    }
  }
  return rows;
}

// --- 6. Footnotes (match by normalised text) ---
function diffFootnotes(soas) {
  // Build per-file UUID→activityName maps so we can resolve activityIds
  const actIdMaps = soas.map(soa => buildActivityIdNameMap(soa));
  const maps = soas.map(soa => buildFootnoteByTextMap(soa?.footnotes));
  const allKeys = unionKeys(maps);
  const rows = [];

  for (const textKey of allKeys) {
    const notes = maps.map(m => m.get(textKey) || null);
    if (notes.every(n => n === null)) continue;
    const preview = textKey.slice(0, 60) + (textKey.length > 60 ? '…' : '');
    const ct = changeType(notes);

    if (notes.some(n => n === null)) {
      // Resolve activity names for added/removed footnotes; fall back to text preview
      const values = notes.map((n, fi) => {
        if (!n) return null;
        if (n.activityIds?.length) {
          const names = n.activityIds
            .map(id => actIdMaps[fi].get(id) || null)
            .filter(Boolean)
            .sort()
            .join(', ');
          if (names) return names;
        }
        return n.text?.slice(0, 80) || '(no text)';
      });
      rows.push({ category:'Footnote', location:preview, field:'attached activities', values, changeType:ct });
    } else {
      // Text is the key — compare resolved activity name lists
      const actLists = notes.map((n, fi) => {
        if (!n?.activityIds?.length) return '(none)';
        return n.activityIds
          .map(id => actIdMaps[fi].get(id) || id)
          .sort()
          .join(', ');
      });
      if (!allEq(actLists)) {
        rows.push({ category:'Footnote', location:preview, field:'attached activities',
          values:actLists, changeType:'changed' });
      }
    }
  }
  return rows;
}

// --- Master ---
function runSoaDiff(soas) {
  const { rows: epochs, epochRefMaps } = diffEpochs(soas);
  const { rows: groups } = diffActivityGroups(soas);
  const { rows: activities, activityMap } = diffActivities(soas);
  const rules = diffScheduleRules(soas, activityMap);
  const days = diffScheduledDays(soas, epochRefMaps);
  const footnotes = diffFootnotes(soas);
  return { epochs, groups, activities, rules, days, footnotes };
}

// ================================================================
// OTHER SECTIONS DIFF ENGINE
// ================================================================

// Decode all HTML entities (named + numeric) AND strip tags via the browser parser.
// This is the canonical normalizer for matching — do not use stripHtml() for comparisons.
function decodeAndStrip(html) {
  const div = document.createElement('div');
  div.innerHTML = String(html || '');
  return div.textContent || div.innerText || '';
}

function normalizeText(str) {
  return decodeAndStrip(str).replace(/\s+/g, ' ').trim().toLowerCase();
}

function rowChangeType(values) {
  if (values.every(v => v === null || v === undefined)) return null;
  const hasNull = values.some(v => v === null || v === undefined);
  if (!hasNull && allEq(values)) return 'present';
  if (hasNull) return (values[0] === null || values[0] === undefined) ? 'added' : 'removed';
  return 'changed';
}

function splitTextSection(html) {
  const str = String(html || '');
  if (!str.trim()) return [];
  const liMatches = [...str.matchAll(/<li[^>]*>([\s\S]*?)(?:<\/li>|(?=<li)|$)/gi)]
    .map(m => decodeAndStrip(m[1]).replace(/\s+/g, ' ').trim()).filter(Boolean);
  if (liMatches.length > 0) return liMatches;
  return [...str.matchAll(/<p[^>]*>([\s\S]*?)(?:<\/p>|$)/gi)]
    .map(m => decodeAndStrip(m[1]).replace(/\s+/g, ' ').trim()).filter(Boolean);
}

function findSectionByType(sections, type) {
  for (const sec of (sections || [])) {
    if (sec?.type === type) return sec;
    const found = findSectionByType(sec?.sections, type) || findSectionByType(sec?.children, type);
    if (found) return found;
  }
  return null;
}

// N-way item matching: match by id first, then by normalized content, then emit unmatched
function matchItemsNWay(itemsPerFile, getId, getNorm) {
  const n = itemsPerFile.length;
  const assigned = itemsPerFile.map(() => new Set());
  const groups = [];

  // Step 1: match by id
  const allIds = new Set();
  itemsPerFile.forEach((arr, fi) => arr.forEach(it => { const id = getId(it); if (id) allIds.add(id); }));
  for (const id of allIds) {
    const values = itemsPerFile.map((arr, fi) => {
      const idx = arr.findIndex((it, i) => !assigned[fi].has(i) && getId(it) === id);
      if (idx >= 0) { assigned[fi].add(idx); return arr[idx]; }
      return null;
    });
    if (values.some(v => v !== null)) groups.push({ key: `id:${id}`, values });
  }

  // Step 2: match remaining by normalized content
  const allNorms = new Set();
  itemsPerFile.forEach((arr, fi) => arr.forEach((it, i) => {
    if (!assigned[fi].has(i)) { const norm = getNorm(it); if (norm) allNorms.add(norm); }
  }));
  for (const norm of allNorms) {
    const values = itemsPerFile.map((arr, fi) => {
      const idx = arr.findIndex((it, i) => !assigned[fi].has(i) && getNorm(it) === norm);
      if (idx >= 0) { assigned[fi].add(idx); return arr[idx]; }
      return null;
    });
    if (values.some(v => v !== null)) groups.push({ key: `norm:${norm}`, values });
  }

  // Step 3: remaining unmatched items
  itemsPerFile.forEach((arr, fi) => arr.forEach((it, i) => {
    if (!assigned[fi].has(i)) {
      const values = itemsPerFile.map((_, fi2) => fi2 === fi ? it : null);
      groups.push({ key: `uniq:${fi}:${i}`, values });
    }
  }));

  return groups;
}

const FUZZY_THRESHOLD = 0.80; // raise toward 0.85–0.90 if false pairings appear

// Character-level Dice coefficient on bigrams — no external library needed
function diceSimilarity(a, b) {
  if (!a || !b) return 0;
  if (a === b) return 1;
  const bigrams = s => {
    const m = new Map();
    for (let i = 0; i < s.length - 1; i++) {
      const bg = s.slice(i, i + 2);
      m.set(bg, (m.get(bg) || 0) + 1);
    }
    return m;
  };
  const bgA = bigrams(a), bgB = bigrams(b);
  let inter = 0;
  for (const [bg, count] of bgA) inter += Math.min(count, bgB.get(bg) || 0);
  const total = (a.length - 1) + (b.length - 1);
  return total <= 0 ? 0 : (2 * inter) / total;
}

// Match items by exact normalized content, then fuzzy (N=2), then add/remove remainder.
// Replaces matchItemsNWay for objectives/estimands/endpoints where id is not a reliable signal.
function matchByNormThenFuzzy(itemsPerFile, getNorm) {
  const n = itemsPerFile.length;
  const assigned = itemsPerFile.map(() => new Set());
  const groups = [];

  // Step 1: exact norm match
  const allNorms = new Set();
  itemsPerFile.forEach((arr, fi) => arr.forEach((it, i) => {
    if (!assigned[fi].has(i)) { const norm = getNorm(it); if (norm) allNorms.add(norm); }
  }));
  for (const norm of allNorms) {
    const found = itemsPerFile.map((arr, fi) => {
      const idx = arr.findIndex((it, i) => !assigned[fi].has(i) && getNorm(it) === norm);
      return idx >= 0 ? { idx, item: arr[idx] } : null;
    });
    // Only exact-match if the norm appears in 2+ files; otherwise leave for fuzzy step
    if (found.filter(v => v !== null).length >= 2) {
      found.forEach((v, fi) => { if (v) assigned[fi].add(v.idx); });
      groups.push({ values: found.map(v => v ? v.item : null) });
    }
  }

  // Collect unmatched
  const unmatched = itemsPerFile.map((arr, fi) =>
    arr.map((item, i) => ({ item, idx: i })).filter(({ idx }) => !assigned[fi].has(idx))
  );

  // Step 2: fuzzy match — greedy by descending score (N=2 only)
  if (n === 2 && unmatched[0].length > 0 && unmatched[1].length > 0) {
    const candidates = [];
    for (let i = 0; i < unmatched[0].length; i++) {
      for (let j = 0; j < unmatched[1].length; j++) {
        const score = diceSimilarity(getNorm(unmatched[0][i].item), getNorm(unmatched[1][j].item));
        if (score >= FUZZY_THRESHOLD) candidates.push({ i, j, score });
      }
    }
    candidates.sort((a, b) => b.score - a.score);
    const usedI = new Set(), usedJ = new Set();
    for (const { i, j } of candidates) {
      if (usedI.has(i) || usedJ.has(j)) continue;
      usedI.add(i); usedJ.add(j);
      groups.push({ values: [unmatched[0][i].item, unmatched[1][j].item] });
    }
    unmatched[0].forEach(({ item }, i) => { if (!usedI.has(i)) groups.push({ values: [item, null] }); });
    unmatched[1].forEach(({ item }, j) => { if (!usedJ.has(j)) groups.push({ values: [null, item] }); });
  } else {
    // N > 2 or only one side unmatched — emit individually
    for (let fi = 0; fi < n; fi++)
      for (const { item } of unmatched[fi])
        groups.push({ values: itemsPerFile.map((_, fi2) => fi2 === fi ? item : null) });
  }

  return groups;
}

// Positional text diff (for ordered lists / paragraphs where position is meaningful)
function diffTextItems(itemsPerFile, sectionTitle, locationPrefix) {
  const maxLen = Math.max(0, ...itemsPerFile.map(a => a.length));
  const rows = [];
  for (let i = 0; i < maxLen; i++) {
    const values = itemsPerFile.map(a => (i < a.length ? a[i] : null));
    const ct = rowChangeType(values) || 'present';
    rows.push({ category: sectionTitle, location: `${locationPrefix} ${i + 1}`, field: 'content', values, changeType: ct });
  }
  return rows;
}

function diffSingleTextSection(parsedFiles, type, sectionTitle, locationPrefix) {
  const sections = parsedFiles.map(p => findSectionByType(p?.sections, type));
  if (sections.every(s => !s)) return [];
  if (sections.some(s => !s)) {
    return [{ category: sectionTitle, location: '(entire section)', field: '—',
      values: sections.map(s => s ? '[present]' : null),
      changeType: rowChangeType(sections.map(s => s ? 'x' : null)) }];
  }
  return diffTextItems(sections.map(s => splitTextSection(s.summaryTextContent)), sectionTitle, locationPrefix);
}

function diffTopLevelTextSection(parsedFiles, topKey, sectionTitle) {
  const sections = parsedFiles.map(p => p?.[topKey] || null);
  if (sections.every(s => !s)) return [];
  if (sections.some(s => !s)) {
    return [{ category: sectionTitle, location: '(entire section)', field: '—',
      values: sections.map(s => s ? '[present]' : null),
      changeType: rowChangeType(sections.map(s => s ? 'x' : null)) }];
  }
  const items = sections.map(s => splitTextSection(s.summaryTextContent));
  const hasList = items.some(a => a.length > 1);
  return diffTextItems(items, sectionTitle, hasList ? 'Item' : 'Paragraph');
}

function diffTopLevelTextSectionWhole(parsedFiles, topKey, sectionTitle) {
  const sections = parsedFiles.map(p => p?.[topKey] || null);
  if (sections.every(s => !s)) return [];
  if (sections.some(s => !s)) {
    return [{ category: sectionTitle, location: '(entire section)', field: '—',
      values: sections.map(s => s ? '[present]' : null),
      changeType: rowChangeType(sections.map(s => s ? 'x' : null)) }];
  }
  const values = sections.map(s => decodeAndStrip(s.summaryTextContent || '').replace(/\s+/g, ' ').trim() || null);
  const ct = rowChangeType(values) || 'present';
  return [{ category: sectionTitle, location: 'Full text', field: 'content', values, changeType: ct }];
}

function diffPopulationSection(parsedFiles) {
  const sectionTitle = 'Population';
  const sections = parsedFiles.map(p => findSectionByType(p?.sections, 'population-section'));
  if (sections.every(s => !s)) return [];
  if (sections.some(s => !s)) {
    return [{ category: sectionTitle, location: '(entire section)', field: '—',
      values: sections.map(s => s ? '[present]' : null),
      changeType: rowChangeType(sections.map(s => s ? 'x' : null)) }];
  }
  const rows = [];
  rows.push(...diffTextItems(sections.map(s => splitTextSection(s.summaryTextContent)), sectionTitle, 'Paragraph'));
  const nameVals = sections.map(s => s.population?.name ?? null);
  rows.push({ category: sectionTitle, location: 'Population', field: 'name', values: nameVals, changeType: rowChangeType(nameVals) || 'present' });
  const sizeVals = sections.map(s => s.population?.size != null ? String(s.population.size) : null);
  rows.push({ category: sectionTitle, location: 'Population', field: 'size', values: sizeVals, changeType: rowChangeType(sizeVals) || 'present' });
  return rows;
}

function diffObjectivesAndEndpoints(parsedFiles) {
  const sectionTitle = 'Objectives & Endpoints';
  const n = parsedFiles.length;
  const sections = parsedFiles.map(p => findSectionByType(p?.sections, 'objectives-and-endpoints-section'));
  if (sections.every(s => !s)) return [];
  if (sections.some(s => !s)) {
    return [{ category: sectionTitle, location: '(entire section)', field: '—',
      values: sections.map(s => s ? '[present]' : null),
      changeType: rowChangeType(sections.map(s => s ? 'x' : null)) }];
  }

  const rows = [];

  // Build per-file type maps: typeId → { typeName, objectives[] }
  const perFileByType = sections.map(sec => {
    const m = new Map();
    for (const g of (sec.objectivesAndEndpoints || [])) {
      const tid = g.type?.id || 'unknown';
      m.set(tid, {
        typeName: g.type?.name || tid,
        objectives: (g.objectives || []).map(o => ({
          id: o.id || null,
          norm: normalizeText(o.content || ''),
          raw: decodeAndStrip(o.content || '').replace(/\s+/g, ' ').trim(),
          estimand: o.estimand ? {
            treatment:            { norm: normalizeText(o.estimand.treatment || ''),            raw: decodeAndStrip(o.estimand.treatment || '').replace(/\s+/g, ' ').trim() },
            analysisPopulation:   { norm: normalizeText(o.estimand.analysisPopulation || ''),   raw: decodeAndStrip(o.estimand.analysisPopulation || '').replace(/\s+/g, ' ').trim() },
            variableOfInterest:   { norm: normalizeText(o.estimand.variableOfInterest || ''),   raw: decodeAndStrip(o.estimand.variableOfInterest || '').replace(/\s+/g, ' ').trim() },
            intercurrentEvents:   { norm: normalizeText(o.estimand.intercurrentEvents || ''),   raw: decodeAndStrip(o.estimand.intercurrentEvents || '').replace(/\s+/g, ' ').trim() },
          } : null,
          endpoints: (o.endpoints || []).map(e => ({
            id: e.id || null,
            norm: normalizeText(e.content || ''),
            raw: decodeAndStrip(e.content || '').replace(/\s+/g, ' ').trim(),
          })),
        })),
      });
    }
    return m;
  });

  // Detect cross-type moves (N=2 only)
  const crossTypeSkip = new Set(); // 'fi:typeId:norm'
  if (n === 2) {
    for (const t0 of perFileByType[0].keys()) {
      for (const t1 of perFileByType[1].keys()) {
        if (t0 === t1) continue;
        const objs0 = perFileByType[0].get(t0)?.objectives || [];
        const objs1 = perFileByType[1].get(t1)?.objectives || [];
        for (const o0 of objs0) {
          const match = objs1.find(o1 =>
            (o0.norm && o0.norm === o1.norm && o0.norm !== ''));
          if (match && !crossTypeSkip.has(`0:${t0}:${o0.norm}`) && !crossTypeSkip.has(`1:${t1}:${match.norm}`)) {
            crossTypeSkip.add(`0:${t0}:${o0.norm}`);
            crossTypeSkip.add(`1:${t1}:${match.norm}`);
            const tn0 = perFileByType[0].get(t0)?.typeName || t0;
            const tn1 = perFileByType[1].get(t1)?.typeName || t1;
            const preview = o0.raw.slice(0, 50) + (o0.raw.length > 50 ? '…' : '');
            rows.push({ category: sectionTitle,
              location: `${tn0} › ${preview} → ${tn1} › ${preview}`,
              field: 'group', values: [tn0, tn1], changeType: 'moved' });
          }
        }
      }
    }
  }

  // Process objectives within each type group in fixed order
  const allTypeIds = [...new Set(parsedFiles.flatMap((_, fi) => [...perFileByType[fi].keys()]))];
  const typeOrder = ['primary', 'secondary', 'exploratory'];
  allTypeIds.sort((a, b) => {
    const ia = typeOrder.indexOf(a), ib = typeOrder.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  for (const typeId of allTypeIds) {
    const typeName = parsedFiles.map((_, fi) => perFileByType[fi].get(typeId)?.typeName).find(Boolean) || typeId;
    const objsPerFile = parsedFiles.map((_, fi) => perFileByType[fi].get(typeId)?.objectives || []);
    const objGroups = matchByNormThenFuzzy(objsPerFile, o => o.norm);

    for (const { values: objVals } of objGroups) {
      const rep = objVals.find(v => v !== null);
      if (!rep) continue;
      // Skip objectives already emitted as cross-type moves
      const isSkipped = objVals.some((v, fi) => v && crossTypeSkip.has(`${fi}:${typeId}:${v.norm}`));
      if (isSkipped) continue;

      const rawVals = objVals.map(v => v ? v.raw : null);
      const ct = rowChangeType(rawVals) || 'present';
      const preview = rep.raw.slice(0, 60) + (rep.raw.length > 60 ? '…' : '');
      const objLocation = `${typeName} › ${preview}`;

      rows.push({ category: sectionTitle, location: objLocation, field: 'objective', values: rawVals, changeType: ct });

      // Estimands and endpoints within this objective (field-type scoped, hierarchy scoped)
      if (ct !== 'added' && ct !== 'removed') {
        // Estimand sub-fields (singular estimand object, four named sub-fields)
        const estSubFields = ['treatment', 'analysisPopulation', 'variableOfInterest', 'intercurrentEvents'];
        const hasAnyEstimand = objVals.some(v => v?.estimand);
        if (hasAnyEstimand) {
          for (const subField of estSubFields) {
            const subVals = objVals.map(v => v?.estimand?.[subField]?.raw ?? null);
            if (subVals.every(v => !v)) continue; // skip when all sides are empty
            rows.push({ category: sectionTitle,
              location: `${objLocation} › Estimand › ${subField}`,
              field: 'estimand', values: subVals, changeType: rowChangeType(subVals) || 'present' });
          }
        }

        // Endpoints
        const epsPerFile = objVals.map(v => v ? v.endpoints : []);
        for (const { values: epVals } of matchByNormThenFuzzy(epsPerFile, e => e.norm)) {
          const repEp = epVals.find(v => v !== null);
          if (!repEp) continue;
          const epRawVals = epVals.map(v => v ? v.raw : null);
          const epPreview = repEp.raw.slice(0, 40) + (repEp.raw.length > 40 ? '…' : '');
          rows.push({ category: sectionTitle,
            location: `${objLocation} › ${epPreview}`,
            field: 'endpoint', values: epRawVals, changeType: rowChangeType(epRawVals) || 'present' });
        }
      }
    }
  }

  return rows;
}

const OTHER_SECTION_DEFS = [
  { id: 'inclusion',  label: 'Inclusion Criteria',        getRows: p => diffSingleTextSection(p, 'inclusion-section',  'Inclusion Criteria',        'Criterion') },
  { id: 'exclusion',  label: 'Exclusion Criteria',        getRows: p => diffSingleTextSection(p, 'exclusion-section',  'Exclusion Criteria',        'Criterion') },
  { id: 'population', label: 'Population',                getRows: p => diffPopulationSection(p) },
  { id: 'objectives', label: 'Objectives & Endpoints',    getRows: p => diffObjectivesAndEndpoints(p) },
  { id: 'design',     label: 'Overall Design',            getRows: p => diffTopLevelTextSection(p, 'overallDesignSummary',      'Overall Design') },
  { id: 'statistics', label: 'Statistical Considerations',getRows: p => diffTopLevelTextSectionWhole(p, 'statisticConsiderations', 'Statistical Considerations') },
];

function runOtherDiff(parsedFiles) {
  const byTab = {};
  const discoveredTabs = [{ id: 'all', label: 'All' }];

  for (const def of OTHER_SECTION_DEFS) {
    const rows = def.getRows(parsedFiles);
    if (rows.length > 0) {
      byTab[def.id] = rows;
      discoveredTabs.push({ id: def.id, label: def.label });
    }
  }

  byTab.all = discoveredTabs.slice(1)
    .flatMap(t => (byTab[t.id] || []).filter(r => r.changeType !== 'present'));

  return { tabs: discoveredTabs, byTab };
}

// ================================================================
// RENDERING
// ================================================================
const TABS = [
  { id:'all',        label:'All' },
  { id:'epochs',     label:'Epochs' },
  { id:'groups',     label:'Activity Groups' },
  { id:'activities', label:'Activities' },
  { id:'rules',      label:'Schedule Rules' },
  { id:'days',       label:'Scheduled Days' },
  { id:'intraday',   label:'Intraday' },
  { id:'footnotes',  label:'Footnotes' },
];

// Tabs where the Epoch Day column is not meaningful (hidden to reduce noise)
const TABS_HIDE_EPOCH_DAY = new Set(['epochs', 'groups', 'activities', 'footnotes']);

// Helper: split d.days into day-level rows vs time-slot rows
// Time Slot rows and their isGroupHeader separators share category:'Time Slot'
function getDayRows(days)      { return days.filter(r => r.category !== 'Time Slot'); }
function getIntradayRows(days) { return days.filter(r => r.category === 'Time Slot' || (r.isGroupHeader && r.category === 'Time Slot')); }

function getTabRows(tab) {
  if (state.compareMode === 'other') {
    return state.otherDiffResult?.byTab[tab] || [];
  }
  if (!state.diffResult) return [];
  const d = state.diffResult;
  switch (tab) {
    case 'all':        return [...d.epochs, ...d.groups.filter(r => r.changeType !== 'present'), ...d.activities, ...d.rules, ...d.days, ...d.footnotes];
    case 'epochs':     return d.epochs;
    case 'groups':     return d.groups;
    case 'activities': return d.activities;
    case 'rules':      return d.rules;
    case 'days':       return getDayRows(d.days);
    case 'intraday':   return getIntradayRows(d.days);
    case 'footnotes':  return d.footnotes;
    default:           return [];
  }
}

function countRows(rows) {
  let added = 0, removed = 0, changed = 0;
  for (const r of rows) {
    if (r.isGroupHeader || r.changeType === 'present') continue;
    if (r.changeType === 'added')                         added++;
    else if (r.changeType === 'removed')                  removed++;
    else if (r.changeType === 'changed' || r.changeType === 'updated' || r.changeType === 'moved') changed++;
  }
  return { added, removed, changed, total: added + removed + changed };
}

function renderResults() {
  const vf = validFiles();
  if (state.compareMode === 'other' ? !state.otherDiffResult : !state.diffResult) return;

  // --- Tab bar ---
  const activeTabs = state.compareMode === 'other' ? state.otherDiffResult.tabs : TABS;
  document.getElementById('tab-bar').innerHTML = activeTabs.map(tab => {
    const { total } = countRows(getTabRows(tab.id));
    const active = state.activeTab === tab.id;
    return `<button data-tab="${tab.id}" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${
      active ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-100 border border-gray-200 bg-white'
    }" ${active ? '' : 'style="box-shadow:0 1px 0 rgba(0,0,0,.06)"'}>
      ${esc(tab.label)}<span class="ml-1.5 ${active ? 'text-gray-400' : 'text-gray-400'}">${total}</span>
    </button>`;
  }).join('');

  // --- Summary bar ---
  const { added, removed, changed } = countRows(getTabRows(state.activeTab));
  document.getElementById('summary-bar').innerHTML = `
    <span class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium" style="background:#F0FDF4;color:#166534">
      <span class="w-1.5 h-1.5 rounded-full inline-block" style="background:#166534"></span>${added} added
    </span>
    <span class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium" style="background:#FEF2F2;color:#991B1B">
      <span class="w-1.5 h-1.5 rounded-full inline-block" style="background:#991B1B"></span>${removed} removed
    </span>
    <span class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium" style="background:#FEF3C7;color:#92400E">
      <span class="w-1.5 h-1.5 rounded-full inline-block" style="background:#92400E"></span>${changed} changed
    </span>`;

  // --- Diff table ---
  const rows = getTabRows(state.activeTab);
  const content = document.getElementById('diff-content');
  const showEpochDay = state.compareMode === 'soa' && !TABS_HIDE_EPOCH_DAY.has(state.activeTab);
  const totalCols = (showEpochDay ? 4 : 3) + vf.length + 1; // Category + Location + [EpochDay] + Field + N files + Change

  const activityDisclaimer = state.compareMode === 'soa' && state.activeTab === 'activities'
    ? `<div class="px-4 py-2.5 text-xs text-amber-700 bg-amber-50 border-b border-amber-100 flex items-start gap-2">
        <svg class="w-3.5 h-3.5 flex-shrink-0 mt-0.5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z"/>
        </svg>
        <span><strong>Note:</strong> Placeholder or sub-item activities with slightly different names between exports may appear as false Add/Remove pairs.</span>
      </div>`
    : '';

  if (!rows.length) {
    content.innerHTML = activityDisclaimer + `<div class="px-8 py-16 text-center text-gray-400 text-sm">No differences found in this section.</div>`;
    return;
  }

  const fileHeaders = vf.map((f, i) => {
    const soaTitle = state.compareMode === 'soa' ? (state.soaSections[i]?.[state.selectedSoaIdxs[i] ?? 0]?.title || '') : '';
    return `<th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500">
      <div class="flex items-center gap-1.5 whitespace-nowrap">
        <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-bold ${labelClass(i)}">${esc(fileLabel(i))}</span>
        <span class="font-normal text-gray-500">${esc(displayName(f.name))}</span>
      </div>
      ${soaTitle ? `<div class="mt-0.5 text-gray-400 font-normal text-[11px] whitespace-nowrap">${esc(soaTitle)}</div>` : ''}
    </th>`;
  }).join('');

  const tableRows = rows.map(row => {
    if (row.isGroupHeader) {
      return `<tr class="diff-row">
        <td colspan="${totalCols}" class="px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wide" style="background:#F1F5F9">
          ${esc(row.location)}
        </td>
      </tr>`;
    }

    // Majority value for 'changed' rows (for highlight logic)
    let majorityStr = null;
    if (row.changeType === 'changed') {
      const freq = new Map();
      for (const v of row.values) { const k = String(v ?? ''); freq.set(k, (freq.get(k)||0)+1); }
      let max = 0;
      for (const [k,f] of freq) if (f > max) { max = f; majorityStr = k; }
    }

    let badge;
    if (row.changeType === 'present') {
      badge = `<span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background:#F1F5F9;color:#64748B">Match</span>`;
    } else if (row.category === 'Activity Group' && (row.changeType === 'added' || row.changeType === 'removed')) {
      const presentLabels = row.values.map((v, i) => v !== null ? `Study ${fileLabel(i)}` : null).filter(Boolean);
      badge = `<span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background:#EFF6FF;color:#1D4ED8">Only in ${esc(presentLabels.join(' & '))}</span>`;
    } else if (row.changeType === 'added') {
      badge = `<span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background:#DCFCE7;color:#166534">Added</span>`;
    } else if (row.changeType === 'removed') {
      badge = `<span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background:#FEE2E2;color:#991B1B">Removed</span>`;
    } else if (row.changeType === 'updated') {
      badge = `<span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background:#FEF3C7;color:#92400E">Rule updated</span>`;
    } else if (row.changeType === 'moved') {
      badge = `<span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background:#EDE9FE;color:#6D28D9">Moved</span>`;
    } else {
      badge = `<span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background:#FEF3C7;color:#92400E">Changed</span>`;
    }

    const valueCells = vf.map((_, i) => {
      const v = row.values[i];
      const absent = v === null || v === undefined;
      if (absent) return `<td class="px-3 py-2.5 text-xs val-absent">—</td>`;
      const text = esc(displayVal(v));
      let cls = '';
      if (row.changeType === 'present')          cls = 'val-match';
      else if (row.changeType === 'added')       cls = 'val-added';
      else if (row.changeType === 'removed')     cls = 'val-removed';
      else if (row.changeType === 'updated')     cls = 'val-changed'; // both sides shown in amber
      else if (row.changeType === 'moved')       cls = 'val-moved';  // both sides shown in purple
      else if (row.changeType === 'changed')     cls = String(v ?? '') === majorityStr ? 'val-match' : 'val-changed';
      return `<td class="px-3 py-2.5 text-xs ${cls} break-words overflow-wrap-anywhere">${text}</td>`;
    }).join('');

    const epochDayCell = showEpochDay
      ? (row.epochDay != null
          ? `<td class="px-3 py-2.5 text-xs text-gray-500">${esc(String(row.epochDay))}</td>`
          : `<td class="px-3 py-2.5 text-xs val-absent">—</td>`)
      : '';

    // Two-tone location for O&E rows: type label prominent, content segments muted
    const locationHtml = (() => {
      if (row.category === 'Objectives & Endpoints' && row.location.includes(' › ') && !row.location.includes(' → ')) {
        const parts = row.location.split(' › ');
        return parts.map((p, idx) =>
          idx === 0
            ? `<span class="text-gray-800 font-medium">${esc(p)}</span>`
            : `<span class="text-gray-400">${esc(p)}</span>`
        ).join(`<span class="text-gray-300 mx-0.5"> › </span>`);
      }
      return `<span class="text-gray-600">${esc(row.location)}</span>`;
    })();

    return `<tr class="row-${row.changeType} diff-row border-t border-gray-100/60 align-top">
      <td class="px-3 py-2.5 text-xs text-gray-400 break-words">${esc(row.category)}</td>
      <td class="px-3 py-2.5 text-xs break-words">${locationHtml}</td>
      ${epochDayCell}
      <td class="px-3 py-2.5 text-xs text-gray-500 mono break-words">${esc(row.field)}</td>
      ${valueCells}
      <td class="px-3 py-2.5 text-xs">${badge}</td>
    </tr>`;
  }).join('');

  // Column widths: narrow fixed cols + location + equal-share value cols
  const narrowPct = 8, fieldPct = 11, locationPct = 20;
  const fixedPct = narrowPct * (2 + (showEpochDay ? 1 : 0)) + fieldPct + locationPct;
  const valuePct = Math.floor((100 - fixedPct) / vf.length);
  const colgroup = `<colgroup>
    <col style="width:${narrowPct}%">
    <col style="width:${locationPct}%">
    ${showEpochDay ? `<col style="width:${narrowPct}%">` : ''}
    <col style="width:${fieldPct}%">
    ${vf.map(() => `<col style="width:${valuePct}%">`).join('')}
    <col style="width:${narrowPct}%">
  </colgroup>`;

  content.innerHTML = activityDisclaimer + `
    <table class="w-full border-collapse table-fixed">
      ${colgroup}
      <thead class="sticky top-0 z-10 bg-white">
        <tr class="border-b border-gray-200">
          <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500 whitespace-nowrap">Category</th>
          <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500">Location</th>
          ${showEpochDay ? `<th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500 whitespace-nowrap">Epoch Day</th>` : ''}
          <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500 mono">Field</th>
          ${fileHeaders}
          <th class="px-3 py-2.5 text-left text-xs font-semibold text-gray-500">Change</th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>`;
}

// ================================================================
// CLIPBOARD
// ================================================================
function buildClipboard() {
  const vf = validFiles();
  const rows = getTabRows(state.activeTab).filter(r => !r.isGroupHeader);
  const activeTabs = state.compareMode === 'other' ? (state.otherDiffResult?.tabs || TABS) : TABS;
  const tabLabel = activeTabs.find(t => t.id === state.activeTab)?.label || state.activeTab;
  const L = [];
  const header = state.compareMode === 'other'
    ? `=== PROTOCOL SECTIONS DIFF — ${tabLabel.toUpperCase()} ===`
    : `=== FSD SOA DIFF — ${tabLabel.toUpperCase()} ===`;
  L.push(header);
  L.push('Files:');
  vf.forEach((f, i) => L.push(`  ${fileLabel(i)}: ${displayName(f.name)}`));
  L.push('');
  const p = (s, w) => String(s ?? '—').slice(0,w).padEnd(w);
  const N = vf.length;
  const hdr = `${p('Category',16)} ${p('Location',36)} ${p('Field',20)} ${vf.map((_,i)=>p(fileLabel(i),24)).join(' ')} Change`;
  L.push(hdr);
  L.push('─'.repeat(hdr.length));
  for (const row of rows) {
    L.push(`${p(row.category,16)} ${p(row.location,36)} ${p(row.field,20)} ${vf.map((_,i)=>p(displayVal(row.values[i]),24)).join(' ')} ${row.changeType}`);
  }
  L.push('');
  L.push('=== END ===');
  return L.join('\n');
}

// ================================================================
// FILE UPLOAD
// ================================================================
function processFiles(fileList) {
  Array.from(fileList).forEach(file => {
    if (state.files.length >= 5) return;
    if (!/\.json$/i.test(file.name) && file.type !== 'application/json') return;
    if (state.files.some(f => f.name === file.name)) return;
    const entry = { id: Date.now() + Math.random(), name: file.name, size: file.size, parsed: null, error: null };
    state.files.push(entry);
    const reader = new FileReader();
    reader.onload = e => {
      try { entry.parsed = JSON.parse(e.target.result); entry.error = null; }
      catch { entry.error = 'Invalid JSON'; }
      renderFilePills();
      syncControls();
    };
    reader.readAsText(file);
  });
  renderFilePills();
  syncControls();
}

function renderFilePills() {
  const list = document.getElementById('file-list');
  if (!state.files.length) {
    document.getElementById('upload-right').classList.add('hidden');
    return;
  }
  document.getElementById('upload-right').classList.remove('hidden');
  list.innerHTML = state.files.map((f, i) => {
    const hasError = !!f.error;
    const isLoading = !f.parsed && !f.error;
    return `<div class="flex items-center gap-2 px-3 py-1.5 rounded-lg border text-xs ${hasError ? 'border-red-200 bg-red-50' : isLoading ? 'border-gray-200 bg-gray-50' : 'border-gray-200 bg-white'}">
      <span class="px-1.5 py-0.5 rounded font-bold text-xs ${labelClass(i)}">${esc(fileLabel(i))}</span>
      <span class="font-medium text-gray-700 max-w-[140px] truncate" title="${esc(f.name)}">${esc(displayName(f.name))}</span>
      <span class="text-gray-400">${fmtSize(f.size)}</span>
      ${hasError ? `<span class="text-red-500">${esc(f.error)}</span>` : ''}
      <button data-remove-file="${f.id}" class="ml-1 text-gray-300 hover:text-gray-500 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>`;
  }).join('');
}

function syncControls() {
  const valid = validFiles();
  const controls = document.getElementById('controls');
  const soaPicker = document.getElementById('soa-picker');

  if (!state.files.length) {
    document.getElementById('upload-right').classList.add('hidden');
    controls.classList.add('hidden');
    return;
  }
  document.getElementById('upload-right').classList.remove('hidden');
  controls.classList.remove('hidden');

  if (valid.length >= 2) {
    state.soaSections = valid.map(f => extractSoaSections(f.parsed));
    const needsPicker = state.soaSections.some(secs => secs.length > 1);

    // Always show picker so users can see/change which SOA is selected per file
    soaPicker.classList.remove('hidden');
    soaPicker.innerHTML = `<div class="text-xs font-medium text-gray-500 mb-2 uppercase tracking-wide">SOA section</div>
      <div class="flex flex-col gap-1.5">` +
      valid.map((f, fi) => {
        const secs = state.soaSections[fi];
        const onlyOne = secs.length <= 1;
        const currentIdx = state.selectedSoaIdxs[fi] ?? 0;
        return `<div class="flex items-center gap-1.5 min-w-0">
          <span class="px-1.5 py-0.5 rounded text-xs font-bold flex-shrink-0 ${labelClass(fi)}">${esc(fileLabel(fi))}</span>
          <select name="soa-pick-${fi}"
            class="w-auto text-xs rounded-lg border border-gray-200 bg-white px-2 py-1 text-gray-700 focus:outline-none focus:ring-1 focus:ring-gray-400 transition-colors ${onlyOne ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:border-gray-300'}"
            ${onlyOne ? 'disabled' : ''}
            style="max-width:min(280px,calc(100% - 2rem));box-shadow:0 1px 0 rgba(0,0,0,.04)">
            ${secs.map((sec, si) => `<option value="${si}" ${si===currentIdx?'selected':''}>${esc(sec.title)}</option>`).join('')}
            ${secs.length === 0 ? `<option disabled>No SOA found</option>` : ''}
          </select>
        </div>`;
      }).join('') + `</div>`;

    const allHaveSoa = state.soaSections.every(secs => secs.length > 0);
    document.getElementById('compare-btn').disabled = !allHaveSoa;
    document.getElementById('compare-other-btn').disabled = false;
  } else {
    soaPicker.classList.add('hidden');
    document.getElementById('compare-btn').disabled = true;
    document.getElementById('compare-other-btn').disabled = true;
  }
}

function doCompare() {
  const vf = validFiles();
  if (vf.length < 2) return;

  state.soaSections = vf.map(f => extractSoaSections(f.parsed));
  state.selectedSoaIdxs = vf.map((_, fi) => {
    const sel = document.querySelector(`select[name="soa-pick-${fi}"]`);
    return sel ? parseInt(sel.value, 10) : 0;
  });

  const soas = vf.map((_, fi) => state.soaSections[fi]?.[state.selectedSoaIdxs[fi]]?.soa || null);

  if (soas.some(s => s === null)) {
    const missing = vf.filter((_, fi) => !soas[fi]).map((f,_) => displayName(f.name)).join(', ');
    alert(`No Schedule of Activities section found in: ${missing}`);
    return;
  }

  state.diffResult = runSoaDiff(soas);
  state.activeTab = 'all';
  state.compareRan = true;

  document.getElementById('results-section').classList.remove('hidden');
  renderResults();
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
}

// ================================================================
// EVENT LISTENERS
// ================================================================
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') fileInput.click(); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-blue-400','bg-blue-50/40'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-blue-400','bg-blue-50/40'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('border-blue-400','bg-blue-50/40');
  processFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => { processFiles(e.target.files); fileInput.value = ''; });

document.getElementById('file-list').addEventListener('click', e => {
  const btn = e.target.closest('[data-remove-file]');
  if (!btn) return;
  const id = parseFloat(btn.dataset.removeFile);
  state.files = state.files.filter(f => f.id !== id);
  if (!state.files.length) {
    state.compareRan = false;
    state.diffResult = null;
    document.getElementById('results-section').classList.add('hidden');
  }
  renderFilePills();
  syncControls();
});

function doCompareOther() {
  const vf = validFiles();
  if (vf.length < 2) return;
  state.compareMode = 'other';
  state.otherDiffResult = runOtherDiff(vf.map(f => f.parsed));
  state.activeTab = 'all';
  document.getElementById('results-section').classList.remove('hidden');
  renderResults();
  document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('compare-btn').addEventListener('click', () => {
  state.compareMode = 'soa';
  doCompare();
});
document.getElementById('compare-other-btn').addEventListener('click', doCompareOther);

document.getElementById('clear-btn').addEventListener('click', () => {
  state.files = [];
  state.soaSections = [];
  state.selectedSoaIdxs = [];
  state.diffResult = null;
  state.otherDiffResult = null;
  state.compareMode = 'soa';
  state.compareRan = false;
  state.activeTab = 'all';
  fileInput.value = '';
  document.getElementById('results-section').classList.add('hidden');
  document.getElementById('upload-right').classList.add('hidden');
  document.getElementById('controls').classList.add('hidden');
  renderFilePills();
});

document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('[data-tab]');
  if (!btn) return;
  state.activeTab = btn.dataset.tab;
  renderResults();
});

// ================================================================
// DOWNLOAD DROPDOWN
// ================================================================
const downloadBtn  = document.getElementById('download-btn');
const downloadMenu = document.getElementById('download-menu');

downloadBtn.addEventListener('click', e => {
  e.stopPropagation();
  downloadMenu.classList.toggle('hidden');
});

document.addEventListener('click', () => downloadMenu.classList.add('hidden'));

function csvCell(val) {
  const s = String(val ?? '—');
  return '"' + s.replace(/"/g, '""') + '"';
}

document.getElementById('download-csv').addEventListener('click', () => {
  downloadMenu.classList.add('hidden');
  const vf = validFiles();
  const rows = getTabRows(state.activeTab).filter(r => !r.isGroupHeader);
  const header = ['Category', 'Location', 'Field', ...vf.map(f => displayName(f.name)), 'Change']
    .map(csvCell).join(',');
  const lines = [header, ...rows.map(row =>
    [row.category, row.location, row.field, ...vf.map((_, i) => displayVal(row.values[i]) || '—'), row.changeType]
      .map(csvCell).join(',')
  )];
  const blob = new Blob([lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g, '-');
  a.href = url; a.download = `diff-${state.activeTab}-${ts}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('download-pdf').addEventListener('click', async () => {
  downloadMenu.classList.add('hidden');
  const btn = document.getElementById('download-btn');
  const origHTML = btn.innerHTML;
  btn.innerHTML = 'Generating...';
  btn.disabled = true;
  try {
    const el = document.getElementById('diff-content');
    const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l', 'mm', 'a4');
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW = pageW;
    const imgH = (canvas.height * imgW) / canvas.width;
    const imgData = canvas.toDataURL('image/png');
    let y = 0;
    let remaining = imgH;
    while (remaining > 0) {
      if (y > 0) pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, -y, imgW, imgH);
      y += pageH;
      remaining -= pageH;
    }
    const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
    pdf.save(`diff-${state.activeTab}-${ts}.pdf`);
  } finally {
    btn.innerHTML = origHTML;
    btn.disabled = false;
  }
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const text = buildClipboard();
  const btn = document.getElementById('copy-btn');
  const orig = btn.innerHTML;
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text;
    Object.assign(ta.style, { position:'fixed', top:'-9999px', left:'-9999px' });
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
  };
  (navigator.clipboard ? navigator.clipboard.writeText(text).catch(fallback) : Promise.resolve(fallback()))
    .finally(() => {
      btn.innerHTML = `<svg class="w-3.5 h-3.5 text-green-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg> Copied!`;
      toast('Copied!');
      setTimeout(() => { btn.innerHTML = orig; }, 2000);
    });
});
</script>
